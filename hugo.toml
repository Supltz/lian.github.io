baseURL = 'https://supltz.github.io/lian.github.io/'
languageCode = 'en-us'
title = 'Lian | PhD Student & Researcher'
theme = 'hugo-profile'

[params]
title = "Lian"
description = "PhD student personal website featuring research, publications, and academic updates."
keywords = ["PhD student", "research", "publications", "academic website", "university", "machine learning"]
author = "Lian"

  [params.hero]
  enable = true
  intro = "Hi, I am"
  title = "Lian"
  subtitle = "PhD Student · Researcher"
  content = "I share my research interests, publications, and academic updates here."
  image = ""

  [params.about]
  enable = true
  title = "About Me"
  content = "I am a PhD student focused on impactful, interdisciplinary research. This site collects my projects, publications, and research notes."

  [params.contact]
  enable = true
  title = "Contact"
  content = "email@example.com"

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/#about"
    weight = 1
  [[menu.main]]
    identifier = "publications"
    name = "Publications"
    url = "/publications"
    weight = 2
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blog"
    weight = 3

enableRobotsTXT = true

[sitemap]
  changefreq = "weekly"
  priority = 0.7
  filename = "sitemap.xml"

[outputs]
  home = ["HTML", "RSS", "SITEMAP"]
