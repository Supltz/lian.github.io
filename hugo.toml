  [params.hero]
  enable = true
  intro = ""
  title = ""
  subtitle = ""
  content = "My name is Tangzheng Lian, and I am currently a PhD candidate in the [Social AI & Robotics Lab (SAIR)](https://sairlab.github.io/), led by [Dr. Oya Celiktutan](https://oceliktutan.github.io/), in the Centre for Robotics Research (CoRe) under the Department of Engineering at King’s College London. I am fully funded by the competitive Natural, Mathematical & Engineering Sciences (NMES) Faculty PhD Studentship. Prior to King’s, I completed an MSc in Computer Science (Distinction) at the University of Birmingham and a BEng in Telecommunication Engineering at Beijing University of Posts and Telecommunications (BUPT). My research interests include Trustworthy/Responsible AI, Algorithmic Fairness, Out-of-Distribution (OOD) Generalization, Vision-Language Models (VLMs), and Affective Computing. I am always keen to discuss exciting ideas in these areas, as well as broader CV/ML topics. If you work on similar topics and would like to connect and collaborate, feel free to email me for a chat online or in person (London)."
  image = "images/tangzheng-lian.jpg"

  [params.about]
  enable = false
  title = "About Me"
  image = "images/tangzheng-lian.jpg"
  content = "I am a PhD Candidate in Computer Science at King's College London (advisor: Dr. Oya Celiktutan), funded by the NMES Faculty Studentship. I previously completed an MSc in Computer Science (Distinction) at the University of Birmingham and a BEng in Telecommunication Engineering at BUPT. My research interests include Trustworthy/Responsible AI, Algorithmic Fairness, OOD Generalization, Vision-Language Models, and Affective Computing. I am open to research collaborations and opportunities."

