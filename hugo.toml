baseURL = 'https://supltz.github.io/lian.github.io/'
languageCode = 'en-us'
title = 'Lian | PhD Student & Researcher'
theme = 'hugo-profile'

[params]
title = "Lian"
description = "PhD student personal website featuring research, publications, and academic updates."
keywords = ["PhD student", "research", "publications", "academic website", "university", "machine learning"]
author = "Lian"

  [params.hero]
  enable = true
  intro = "Hi, I am"
  title = "Lian"
  subtitle = "PhD Student · Researcher | Open to Research Collaborations"
  content = "I work on data-driven and interdisciplinary research, and I am actively building projects for academic and industry impact."
  image = ""

  [params.about]
  enable = true
  title = "About Me"
  content = "I am a PhD student focused on impactful interdisciplinary research. My interests include machine learning, computational methods, and real-world applications. Here you can find my publications, ongoing projects, and research updates."

  [params.contact]
  enable = true
  title = "Contact"
  content = "For collaborations, internships, or research opportunities, feel free to reach out: your.email@university.edu"

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/#about"
    weight = 1
  [[menu.main]]
    identifier = "publications"
    name = "Publications"
    url = "/publications"
    weight = 2
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blog"
    weight = 3

enableRobotsTXT = true

[sitemap]
  changefreq = "weekly"
  priority = 0.7
  filename = "sitemap.xml"

[outputs]
  home = ["HTML", "RSS", "SITEMAP"]
