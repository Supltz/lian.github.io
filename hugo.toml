  [params.hero]
  enable = true
  intro = ""
  title = ""
  subtitle = ""
  content = "My name is Tangzheng Lian, and I am currently a third-year PhD candidate in the [Social AI & Robotics Lab (SAIR)](https://sairlab.github.io/), led by [Dr. Oya Celiktutan](https://oceliktutan.github.io/), in the Department of Engineering at King’s College London. I am fortunate to be fully funded by the competitive Natural, Mathematical & Engineering Sciences (NMES) Faculty PhD Studentship at King’s. During my PhD, I have also had the opportunity to work with [Dr Dimitrios Kollias](https://sites.google.com/view/dimitrioskollias/home) at Queen Mary University of London (QMUL). My research interests include Trustworthy/Responsible AI, Algorithmic Fairness, Out-of-Distribution (OOD) Generalization, Vision-Language Models (VLMs), and Affective Computing.\n\nPrior to King’s, I was a Research Assistant at the Computing and Informatics Research Center (CIRC) at Nottingham Trent University, where I worked with [Dr. Doratha Vinkemeier](https://scholar.google.com/citations?user=gyBNKOgAAAAJ&hl=en). I completed my MSc in Computer Science (Distinction) at the University of Birmingham and a BEng in Telecommunication Engineering at Beijing University of Posts and Telecommunications (BUPT).\n\nI am always keen to discuss exciting ideas in broader CV/ML topics. If you work on similar topics and would like to connect and collaborate, feel free to drop me an email for a chat online or in person (London)."
  image = "images/tangzheng-lian.jpg"

  [params.about]
  enable = false
  title = "About Me"
  image = "images/tangzheng-lian.jpg"
  content = "I am a PhD Candidate in Computer Science at King's College London (advisor: Dr. Oya Celiktutan), funded by the NMES Faculty Studentship. I previously completed an MSc in Computer Science (Distinction) at the University of Birmingham and a BEng in Telecommunication Engineering at BUPT. My research interests include Trustworthy/Responsible AI, Algorithmic Fairness, OOD Generalization, Vision-Language Models, and Affective Computing. I am open to research collaborations and opportunities."

